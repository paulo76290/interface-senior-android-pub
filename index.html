<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7f4ee">
    <title>Tablette simple</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="tablet-shell" aria-label="Interface simplifiée pour tablette">
      <section class="top-band" aria-label="Date et heure">
        <div class="clock-panel">
          <p class="date-time-line">
            <span class="time-now" id="timeNow">--:--</span>
            <span class="today" id="today">Bienvenue</span>
          </p>
        </div>
      </section>

      <section class="quick-actions" aria-label="Actions principales">
        <a class="action-tile teams" href="intent://launch/#Intent;package=com.microsoft.teams;S.browser_fallback_url=market%3A%2F%2Fdetails%3Fid%3Dcom.microsoft.teams;end" data-app="teams">
          <span class="tile-icon brand-icon">
            <img src="teams-logo.svg" alt="" aria-hidden="true">
          </span>
          <span class="tile-title">Teams</span>
          <span class="tile-subtitle">Voir la famille ou rejoindre une réunion</span>
        </a>

        <a class="action-tile whatsapp" href="intent://send/#Intent;scheme=whatsapp;package=com.whatsapp;S.browser_fallback_url=https%3A%2F%2Fplay.google.com%2Fstore%2Fapps%2Fdetails%3Fid%3Dcom.whatsapp;end" data-app="whatsapp">
          <span class="tile-icon brand-icon">
            <img src="whatsapp-logo.svg" alt="" aria-hidden="true">
          </span>
          <span class="tile-title">WhatsApp</span>
          <span class="tile-subtitle">Lire ou envoyer un message</span>
        </a>

        <button class="action-tile photos" id="photosButton" type="button" data-app="photos">
          <span class="tile-icon">▣</span>
          <span class="tile-title">Photos</span>
          <span class="tile-subtitle">Regarder les souvenirs</span>
        </button>

        <a class="action-tile orange-mail" href="intent://mail.orange.fr/#Intent;scheme=https;S.browser_fallback_url=https%3A%2F%2Fmail.orange.fr;end" data-app="orange-mail">
          <span class="tile-icon">✉</span>
          <span class="tile-title">Mail Orange</span>
          <span class="tile-subtitle">Lire la boîte mail</span>
        </a>
      </section>

      <section class="lower-band" aria-label="Outils utiles">
        <a class="utility play-store" href="intent://apps/#Intent;scheme=market;package=com.android.vending;S.browser_fallback_url=https%3A%2F%2Fplay.google.com%2Fstore%2Fapps;end">
          <span class="utility-icon play-store-icon">
            <img src="play-store-logo.svg" alt="" aria-hidden="true">
          </span>
          Play Store
        </a>
        <button class="utility danger" type="button" data-action="emergency">
          <span class="utility-icon">!</span>
          Urgence
        </button>
      </section>
    </main>

    <dialog class="dialog" id="noticeDialog" aria-labelledby="noticeTitle">
      <h2 id="noticeTitle">Information</h2>
      <p id="noticeText"></p>
      <button class="primary-button" id="closeNoticeButton" type="button">OK</button>
    </dialog>

    <dialog class="dialog wide-dialog" id="photosDialog" aria-labelledby="photosTitle">
      <h2 id="photosTitle">Photo</h2>
      <div class="photo-gallery" id="photoGallery"></div>
      <label class="file-button">
        Ajouter des images
        <input id="photoInput" type="file" accept="image/*" multiple>
      </label>
      <div class="online-albums" id="onlineAlbumList"></div>
      <form class="album-form" id="onlineAlbumForm">
        <label>
          Nom de l'album
          <input id="onlineAlbumNameInput" name="albumName" type="text" placeholder="Vacances 2025" autocomplete="off" required>
        </label>
        <label>
          Lien de l'album
          <input id="onlineAlbumUrlInput" name="albumUrl" type="url" placeholder="https://..." autocomplete="off" required>
        </label>
        <button class="secondary-button" type="submit">Ajouter un album en ligne</button>
      </form>
      <button class="primary-button" id="closePhotosButton" type="button">Retour</button>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
