<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7f4ee">
    <title>Interface senior PC</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="is-desktop">
    <main class="tablet-shell" aria-label="Interface simplifiÃ©e pour PC">
      <section class="top-band" aria-label="Date et heure">
        <div class="clock-panel">
          <div class="date-time-line">
            <span class="time-now" id="timeNow">--:--</span>
            <span class="today" id="today">Bienvenue</span>
          </div>
          <button class="weather-summary" id="weatherButton" type="button">
            <span class="weather-summary-label" id="homeWeatherLabel">Ajouter la mÃ©tÃ©o</span>
            <span class="weather-summary-temp" id="homeWeatherTemp"></span>
          </button>
        </div>
      </section>

      <section class="quick-actions" aria-label="Actions principales">
        <button class="action-tile teams" id="teamsButton" type="button" data-app="teams">
          <span class="help-badge" aria-label="Teams ouvre la liste des contacts et lance une conversation dans l'application Teams.">?</span>
          <span class="tile-icon brand-icon">
            <img src="teams-logo.svg" alt="" aria-hidden="true">
          </span>
          <span class="tile-title">Teams</span>
          <span class="tile-subtitle">Choisir un contact</span>
        </button>

        <a class="action-tile whatsapp" href="whatsapp://" data-app="whatsapp">
          <span class="help-badge" aria-label="WhatsApp ouvre directement l'application WhatsApp si elle est installee sur le PC.">?</span>
          <span class="tile-icon brand-icon">
            <img src="whatsapp-logo.svg" alt="" aria-hidden="true">
          </span>
          <span class="tile-title">WhatsApp</span>
          <span class="tile-subtitle">Lire ou envoyer un message</span>
        </a>

                <button class="action-tile photos" id="photosButton" type="button" data-app="photos">
          <span class="help-badge" aria-label="Photos permet d'ouvrir des dossiers locaux ou des albums photos internet.">?</span>
          <span class="tile-icon brand-icon">
            <img src="photos-logo.svg" alt="" aria-hidden="true">
          </span>
          <span class="tile-title">Photos</span>
          <span class="tile-subtitle">Regarder les souvenirs</span>
        </button>

        <a class="action-tile web-browser" href="https://www.google.fr" target="_blank" rel="noopener" data-app="web-browser">
          <span class="help-badge" aria-label="Internet ouvre une page web dans le navigateur.">?</span>
          <span class="tile-icon brand-icon">
            <img src="internet-logo.svg" alt="" aria-hidden="true">
          </span>
          <span class="tile-title">Internet</span>
          <span class="tile-subtitle">Ouvrir une page web</span>
        </a>

        <a class="action-tile orange-mail" href="https://mail.orange.fr" target="_blank" rel="noopener" data-app="orange-mail">
          <span class="help-badge" aria-label="Mail Orange ouvre la boite mail Orange dans une nouvelle fenetre.">?</span>
          <span class="tile-icon">✉</span>
          <span class="tile-title">Mail Orange</span>
          <span class="tile-subtitle">Lire la boite mail</span>
        </a>

      </section>

      <section class="lower-band" aria-label="Outils utiles">
        <button class="utility danger" type="button" data-action="emergency">
          <span class="help-badge" aria-label="TeamViewer lance l'application d'assistance a distance TeamViewer QuickSupport.">?</span>
          <span class="utility-icon">!</span>
          TeamViewer
        </button>
        <button class="utility" id="settingsButton" type="button">
          <span class="help-badge" aria-label="Reglages permet d'exporter ou d'importer la configuration de cette interface.">?</span>
          <span class="utility-icon">⚙</span>
          Reglages
        </button>
      </section>
    </main>

    <dialog class="dialog" id="noticeDialog" aria-labelledby="noticeTitle">
      <h2 id="noticeTitle">Information</h2>
      <p id="noticeText"></p>
      <button class="primary-button" id="closeNoticeButton" type="button">OK</button>
    </dialog>

    <dialog class="dialog wide-dialog" id="teamsDialog" aria-labelledby="teamsTitle">
      <div class="dialog-heading">
        <div>
          <h2 id="teamsTitle">Teams</h2>
          <p class="dialog-subtitle">Choisir un contact pour ouvrir une conversation</p>
        </div>
        <button class="secondary-button compact-button" id="newTeamContactButton" type="button">Nouveau contact</button>
      </div>
      <div class="team-list" id="teamContactList"></div>
      <form class="album-form contact-form" id="teamContactForm" hidden>
        <input id="teamEditIndexInput" name="teamEditIndex" type="hidden" value="">
        <label>
          Nom du contact
          <input id="teamNameInput" name="teamName" type="text" placeholder="PrÃ©nom Nom" autocomplete="name">
        </label>
        <label>
          Adresse email Teams
          <input id="teamEmailInput" name="teamEmail" type="email" placeholder="prenom.nom@entreprise.com" autocomplete="email" required>
        </label>
        <div class="form-actions">
          <button class="secondary-button" id="teamSubmitButton" type="submit">Ajouter le contact</button>
          <button class="secondary-button subtle-button" id="cancelTeamEditButton" type="button">Annuler</button>
        </div>
      </form>
      <button class="primary-button" id="closeTeamsButton" type="button">Retour</button>
    </dialog>

    <dialog class="dialog wide-dialog" id="photosDialog" aria-labelledby="photosTitle">
      <h2 id="photosTitle">Photo</h2>
      <div class="section-heading-inline">
        <h3>Liens photos</h3>
        <div class="inline-actions">
          <button class="secondary-button compact-button" id="newLocalFolderButton" type="button">Dossier local</button>
          <button class="secondary-button compact-button" id="newInternetAlbumButton" type="button">Album internet</button>
        </div>
      </div>
      <div class="online-albums" id="onlineAlbumList"></div>
      <form class="album-form contact-form" id="onlineAlbumForm" hidden>
        <input id="onlineAlbumEditIndexInput" name="albumEditIndex" type="hidden" value="">
        <input id="onlineAlbumTypeInput" name="albumType" type="hidden" value="local-folder">
        <label>
          Nom du raccourci
          <input id="onlineAlbumNameInput" name="albumName" type="text" placeholder="Vacances 2025" autocomplete="off" required>
        </label>
        <label>
          Lien ou dossier
          <input id="onlineAlbumUrlInput" name="albumUrl" type="text" placeholder="D:\Images\Photos" autocomplete="off" required>
        </label>
        <div class="form-actions">
          <button class="secondary-button" id="onlineAlbumSubmitButton" type="submit">Ajouter</button>
          <button class="secondary-button subtle-button" id="cancelOnlineAlbumEditButton" type="button">Annuler</button>
        </div>
      </form>
      <button class="primary-button" id="closePhotosButton" type="button">Retour</button>
    </dialog>

    <dialog class="dialog" id="settingsDialog" aria-labelledby="settingsTitle">
      <h2 id="settingsTitle">Reglages</h2>
      <div class="settings-actions">
        <button class="secondary-button" id="exportSettingsButton" type="button">
          Exporter les reglages
        </button>
        <label class="secondary-button import-settings">
          Importer les reglages
          <input id="importSettingsInput" type="file" accept="application/json,.json">
        </label>
      </div>
      <button class="primary-button" id="closeSettingsButton" type="button">Retour</button>
    </dialog>

    <dialog class="dialog wide-dialog" id="weatherDialog" aria-labelledby="weatherTitle">
      <div class="dialog-heading">
        <div>
          <h2 id="weatherTitle">MÃ©tÃ©o</h2>
          <p class="dialog-subtitle" id="weatherPlace">Choisir une ville</p>
        </div>
        <button class="secondary-button compact-button" id="refreshWeatherButton" type="button">Actualiser</button>
      </div>
      <div class="weather-panel" id="weatherPanel">
        <p class="empty-message">Ajoutez une ville pour afficher la mÃ©tÃ©o.</p>
      </div>
      <form class="album-form" id="weatherForm">
        <label>
          Ville
          <input id="weatherCityInput" name="weatherCity" type="text" placeholder="Rouen" autocomplete="address-level2" required>
        </label>
        <button class="secondary-button" type="submit">Enregistrer la ville</button>
      </form>
      <button class="primary-button" id="closeWeatherButton" type="button">Retour</button>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
